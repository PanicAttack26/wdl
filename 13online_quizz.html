<!-- File Name : quiz.html -->

<!DOCTYPE html>
<html>
<head>

    <title>Online Quiz Registration</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
        }

        .container{
            width:400px;
            margin:auto;
            margin-top:40px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h2{
            text-align:center;
            color:darkblue;
        }

        input, select{
            width:100%;
            padding:10px;
            margin-top:8px;
            margin-bottom:15px;
        }

        button{
            background:darkblue;
            color:white;
            border:none;
            padding:10px;
            width:100%;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Online Quiz Registration</h2>

    <!-- Form Controls -->

    Name:
    <input type="text" id="name">

    Email:
    <input type="email" id="email">

    Select Quiz Category:

    <select id="category">

        <option>General Knowledge</option>
        <option>Programming</option>
        <option>Science</option>

    </select>

    College Name:
    <input type="text" id="college">

    <!-- DOM Manipulation -->

    <button onclick="showInfo()">
        Register
    </button>

    <h3 id="result"></h3>

</div>

<!-- JavaScript DOM -->

<script>

function showInfo(){

    let name =
    document.getElementById("name").value;

    let category =
    document.getElementById("category").value;

    document.getElementById("result").textContent =
    "Participant " + name +
    " registered for " + category + " Quiz";

}

</script>

</body>
</html>
