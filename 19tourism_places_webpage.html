<!-- File Name : tourism.html -->

<!DOCTYPE html>
<html>
<head>

    <title>Tourism Webpage</title>

    <style>

        body{
            font-family: Arial;
            margin:0;
            background:#f2f2f2;
        }

        .header{
            background:darkblue;
            color:white;
            text-align:center;
            padding:20px;
        }

        .container{
            width:90%;
            margin:auto;
            margin-top:20px;
        }

        .places{
            display:flex;
            justify-content:space-between;
            gap:20px;
        }

        .card{
            background:white;
            width:30%;
            padding:15px;
            border-radius:10px;
            text-align:center;
            box-shadow:0px 0px 10px gray;
        }

        .card img{
            width:100%;
            height:200px;
            border-radius:10px;
        }

        .card h2{
            color:darkblue;
        }

        .card a{
            text-decoration:none;
            color:darkblue;
            font-weight:bold;
        }

        button{
            background:darkblue;
            color:white;
            border:none;
            padding:10px;
            margin-top:10px;
            cursor:pointer;
            border-radius:5px;
        }

        #info{
            background:white;
            margin-top:25px;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
            font-size:20px;
            text-align:center;
        }

    </style>

</head>

<body>

<!-- Header -->

<div class="header">

    <h1>Tourist Places in India</h1>

    <p>Explore Beautiful Destinations</p>

</div>

<!-- Main Content -->

<div class="container">

    <div class="places">

        <!-- Goa -->

        <div class="card">

            <img src="goa.jpg">

            <h2>Goa</h2>

            <p>Famous for beaches and nightlife.</p>

            <a href="https://www.google.com"
            target="_blank">
            Visit Goa
            </a>

            <br>

            <button onclick="showInfo('Goa is famous for beaches and water sports.')">
                Show Info
            </button>

        </div>

        <!-- Taj Mahal -->

        <div class="card">

            <img src="tajmahal.jpg">

            <h2>Taj Mahal</h2>

            <p>One of the seven wonders of the world.</p>

            <a href="https://www.google.com"
            target="_blank">
            Visit Taj Mahal
            </a>

            <br>

            <button onclick="showInfo('Taj Mahal is located in Agra.')">
                Show Info
            </button>

        </div>

        <!-- Manali -->

        <div class="card">

            <img src="manali.jpg">

            <h2>Manali</h2>

            <p>Beautiful hill station in Himachal Pradesh.</p>

            <a href="https://www.google.com"
            target="_blank">
            Visit Manali
            </a>

            <br>

            <button onclick="showInfo('Manali is popular for snow and mountains.')">
                Show Info
            </button>

        </div>

    </div>

    <!-- DOM Output -->

    <div id="info">

        Click on "Show Info" button to display place information.

    </div>

</div>

<!-- JavaScript DOM -->

<script>

function showInfo(place){

    document.getElementById("info").textContent =
    place;

}

</script>

</body>
</html>
