<!-- File Name : feedback.html -->

<!DOCTYPE html>
<html>
<head>

    <title>Student Feedback Form</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
        }

        .container{
            width:400px;
            margin:auto;
            margin-top:40px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h2{
            text-align:center;
            color:darkblue;
        }

        input, select, textarea{
            width:100%;
            padding:10px;
            margin-top:8px;
            margin-bottom:15px;
        }

        textarea{
            height:100px;
        }

        .btn{
            background:darkblue;
            color:white;
            border:none;
            cursor:pointer;
        }

    </style>

    <!-- JavaScript -->

    <script>

        function validateForm(){

            let name =
            document.getElementById("name").value;

            let feedback =
            document.getElementById("feedback").value;

            if(name == ""){

                alert("Please enter your name");
                return false;
            }

            if(feedback == ""){

                alert("Please enter feedback");
                return false;
            }

            alert("Feedback Submitted Successfully");

            return true;
        }

    </script>

</head>

<body>

<div class="container">

    <h2>Student Feedback Form</h2>

    <form onsubmit="return validateForm()">

        Name:
        <input type="text" id="name">

        Email:
        <input type="email">

        Select Course:

        <select>

            <option>BCA</option>
            <option>BBA</option>
            <option>B.Com</option>

        </select>

        How was our teaching?

        <br><br>

        <input type="radio" name="rating"> Excellent
        <input type="radio" name="rating"> Good
        <input type="radio" name="rating"> Average

        <br><br>

        Suggestions / Feedback:

        <textarea id="feedback"></textarea>

        <input type="submit"
        value="Submit Feedback"
        class="btn">

    </form>

</div>

</body>
</html>
